<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniClip</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 360px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: #202124;
        background: #fff;
      }

      /* Header */
      .header {
        padding: 12px 16px;
        background: #1a73e8;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header h1 {
        font-size: 16px;
        font-weight: 600;
      }
      .header .logout-btn {
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.5);
        color: white;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
      }
      .header .logout-btn:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* Content area */
      .content {
        padding: 12px 16px;
      }

      /* Login form */
      .login-section {
        text-align: center;
        padding: 20px 0;
      }
      .login-section p {
        margin-bottom: 12px;
        color: #5f6368;
      }
      .form-group {
        margin-bottom: 10px;
        text-align: left;
      }
      .form-group label {
        display: block;
        font-size: 11px;
        color: #5f6368;
        margin-bottom: 4px;
      }
      .form-group input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-size: 13px;
        outline: none;
      }
      .form-group input:focus {
        border-color: #1a73e8;
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
      }
      .btn-primary {
        width: 100%;
        padding: 8px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
      }
      .btn-primary:hover {
        background: #1765cc;
      }
      .btn-primary:disabled {
        background: #a8c7fa;
        cursor: not-allowed;
      }

      /* Platform cards */
      .platform-card {
        border: 1px solid #e8eaed;
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 8px;
      }
      .platform-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .platform-name {
        font-weight: 600;
        font-size: 14px;
      }
      .badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 500;
        text-transform: uppercase;
      }
      .badge.active {
        background: #e6f4ea;
        color: #137333;
      }
      .badge.error {
        background: #fce8e6;
        color: #c5221f;
      }
      .badge.disconnected {
        background: #f1f3f4;
        color: #5f6368;
      }

      .platform-stats {
        display: flex;
        gap: 16px;
        font-size: 11px;
        color: #5f6368;
        margin-bottom: 6px;
      }
      .platform-stats span {
        display: flex;
        align-items: center;
        gap: 3px;
      }
      .sync-btn {
        padding: 4px 10px;
        background: none;
        border: 1px solid #dadce0;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        color: #1a73e8;
      }
      .sync-btn:hover {
        background: #f8f9fa;
      }
      .sync-btn:disabled {
        color: #80868b;
        cursor: not-allowed;
      }

      .error-msg {
        font-size: 11px;
        color: #c5221f;
        margin-top: 4px;
        background: #fce8e6;
        padding: 6px 8px;
        border-radius: 4px;
      }

      .login-error {
        font-size: 11px;
        color: #c5221f;
        margin-top: 6px;
      }

      /* Footer */
      .footer {
        padding: 8px 16px;
        border-top: 1px solid #e8eaed;
        font-size: 10px;
        color: #80868b;
        text-align: center;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>OmniClip</h1>
      <button class="logout-btn hidden" id="logoutBtn">Logout</button>
    </div>

    <div class="content">
      <!-- Login Section -->
      <div id="loginSection" class="login-section">
        <p>Sign in to start syncing your content</p>
        <div class="form-group">
          <label for="serverUrl">Backend Server URL</label>
          <input
            type="url"
            id="serverUrl"
            placeholder="http://localhost:3001"
            value="http://localhost:3001"
          />
        </div>
        <div class="form-group">
          <label for="tokenInput">JWT Token</label>
          <input type="password" id="tokenInput" placeholder="Paste your access token" />
        </div>
        <button class="btn-primary" id="loginBtn">Sign In</button>
        <div class="login-error hidden" id="loginError"></div>
      </div>

      <!-- Dashboard Section -->
      <div id="dashboardSection" class="hidden">
        <div id="platformCards"></div>
      </div>
    </div>

    <div class="footer">OmniClip v<span id="version">0.1.0</span></div>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
