<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniClip</title>
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h1 { font-size: 18px; margin: 0 0 12px 0; }
    .status { padding: 8px; border-radius: 4px; margin-bottom: 8px; }
    .status.active { background: #e6f4ea; color: #137333; }
    .status.error { background: #fce8e6; color: #c5221f; }
    .status.disconnected { background: #f1f3f4; color: #5f6368; }
  </style>
</head>
<body>
  <h1>OmniClip</h1>
  <div id="app">
    <div class="status disconnected">
      Not logged in. Please login to start syncing.
    </div>
  </div>
</body>
</html>
